<!DOCTYPE html>
<html lang="id">
<head>
    <!-- CDN Dependensi DocxTemplater & PizZip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.50.0/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.7/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.7/pizzip-utils.js"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Generator SPPD - Kejaksaan Digital</title>
    <!-- Tailwind CSS untuk Layouting UI Input -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* CSS Paged Media untuk Cetak Presisi A4 */
        @media print {
            body {
                background-color: #ffffff !important;
                color: #000000 !important;
                font-family: 'Arial', sans-serif !important;
            }
            .no-print {
                display: none !important;
            }
            .print-area {
                display: block !important;
                width: 210mm;
                margin: 0;
                padding: 0;
            }
            .page-break {
                page-break-before: always;
                break-before: page;
            }
            @page {
                size: A4;
                margin: 15mm 12mm;
            }
            table {
                page-break-inside: avoid;
            }
            tr {
                page-break-inside: avoid;
                page-break-after: auto;
            }
        }
        
        /* Gaya Khusus Dokumen Dinas Resmi (Preview Box) */
        .spd-document {
            font-family: 'Arial', sans-serif;
            color: #000000;
            line-height: 1.3;
            font-size: 10pt;
        }
        .spd-document table {
            width: 100%;
            border-collapse: collapse;
        }
        .spd-table-main td {
            padding: 4px 2px;
            vertical-align: top;
        }
        .spd-border-table th, .spd-border-table td {
            border: 1px solid #000000;
            padding: 5px;
            font-size: 9.5pt;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 flex flex-col antialiased">

    <!-- HEADER APLIKASI (no-print) -->
    <header class="bg-emerald-800 text-white shadow-md p-4 no-print">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-white p-2 rounded-full text-emerald-800 font-bold text-xl">⚓</div>
                <div>
                    <h1 class="font-bold text-lg tracking-wide">KEJAKSAAN DIGITAL</h1>
                    <p class="text-xs text-emerald-200">Sistem Ekspedisi & Penerbitan Surat Perjalanan Dinas Terstandardisasi</p>
                </div>
            </div>
            <div class="flex space-x-2">
                <button onclick="window.print()" class="bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold px-4 py-2 rounded shadow transition text-sm flex items-center space-x-1 cursor-pointer">
                    <span>🖨️</span> <span>Cetak / PDF</span>
                </button>
                <button onclick="downloadWord()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 py-2 rounded shadow transition text-sm flex items-center space-x-1 cursor-pointer">
                    <span>📝</span> <span>Unduh Word (.docx)</span>
                </button>
            </div>
        </div>
    </header>

    <!-- KONTEN UTAMA SPLIT SCREEN (no-print) -->
    <main class="flex-1 container mx-auto p-4 flex flex-col lg:flex-row gap-6 no-print">
        
        <!-- PANEL KIRI: FORMULIR INPUT -->
        <section class="w-full lg:w-5/12 bg-white rounded-xl shadow p-6 overflow-y-auto max-h-[85vh]">
            <h2 class="text-lg font-bold border-b border-slate-200 pb-2 text-emerald-800 flex items-center mb-4">
                <span class="mr-2">📝</span> Data Input Utama SPPD
            </h2>
            
            <form id="sppdForm" class="space-y-4">
                <!-- 1. Instansi & Nomor -->
                <div class="bg-slate-50 p-3 rounded-lg border border-slate-200 space-y-3">
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider">Metadata Dinas & Nomor Surat</label>
                    <div>
                        <label class="block text-xs text-slate-600">Satuan Kerja (Kementerian / Lembaga)</label>
                        <input type="text" id="in_satuan_kerja" value="Kejaksaan Tinggi Maluku" class="w-full border rounded px-3 py-1.5 text-sm focus:ring-2 focus:ring-emerald-500 bg-white">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-600">Nomor SPPD</label>
                        <input type="text" id="in_nomor" value="SPPD-024/PPK/01/2026" class="w-full border rounded px-3 py-1.5 text-sm font-mono focus:ring-2 focus:ring-emerald-500 bg-white">
                    </div>
                </div>

                <!-- 2. Data Pegawai Utama -->
                <div class="bg-slate-50 p-3 rounded-lg border border-slate-200 space-y-3">
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider">Pelaksana Perjalanan Dinas Utama</label>
                    <!-- UPDATE: Tambahan kolom input nama pegawai utama sesuai template terbaru -->
                    <div>
                        <label class="block text-xs text-slate-600">Nama Pegawai Utama</label>
                        <input type="text" id="in_nama_pegawai" value="LUTHER KURNIAWAN, S.H., M.H." class="w-full border rounded px-3 py-1.5 text-sm bg-white">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-600">NIP Utama</label>
                        <input type="text" id="in_nip_utama" value="197405082000031002" class="w-full border rounded px-3 py-1.5 text-sm font-mono bg-white">
                        <span id="nip_warning" class="text-xs text-red-500 font-semibold block mt-1"></span>
                    </div>
                    <div>
                        <label class="block text-xs text-slate-600">Pangkat / Golongan</label>
                        <input type="text" id="in_pangkat_utama" value="Jaksa Madya (IV/a)" class="w-full border rounded px-3 py-1.5 text-sm bg-white">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-600">Jabatan / Instansi</label>
                        <input type="text" id="in_jabatan_utama" value="Asisten Bidang Pengawasan Kejaksaan Tinggi Maluku" class="w-full border rounded px-3 py-1.5 text-sm bg-white">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-600">Tingkat Biaya</label>
                        <input type="text" id="in_biaya_utama" value="C" class="w-full border rounded px-3 py-1.5 text-sm bg-white">
                    </div>
                </div>

                <!-- 3. Rincian Dinas -->
                <div class="bg-slate-50 p-3 rounded-lg border border-slate-200 space-y-3">
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider">Maksud & Rute Dinas</label>
                    <div>
                        <label class="block text-xs text-slate-600">Maksud Perjalanan Dinas</label>
                        <textarea id="in_maksud" rows="2" class="w-full border rounded px-3 py-1.5 text-sm bg-white">Melaksanakan Kegiatan Inspeksi Pemantauan Semester I Tahun Anggaran 2026 di Daerah Hukum Kejaksaan Negeri Buru.</textarea>
                    </div>
                    <div>
                        <label class="block text-xs text-slate-600">Alat Angkutan</label>
                        <input type="text" id="in_angkutan" value="Pesawat - Mobil" class="w-full border rounded px-3 py-1.5 text-sm bg-white">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs text-slate-600">Tempat Berangkat (Asal)</label>
                            <input type="text" id="in_asal" value="Ambon" class="w-full border rounded px-3 py-1.5 text-sm bg-white">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-600">Tempat Tujuan</label>
                            <input type="text" id="in_tujuan" value="Kejaksaan Negeri Buru - Namlea" class="w-full border rounded px-3 py-1.5 text-sm bg-white">
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <div>
                            <label class="block text-xs text-slate-600">Lama Perjalanan</label>
                            <input type="text" id="in_lama" value="3 (tiga) Hari" class="w-full border rounded px-3 py-1.5 text-sm bg-white">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-600">Tgl Berangkat</label>
                            <input type="text" id="in_tgl_berangkat" value="26 Januari 2026" class="w-full border rounded px-3 py-1.5 text-sm bg-white">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-600">Tgl Kembali</label>
                            <input type="text" id="in_tgl_kembali" value="28 Januari 2026" class="w-full border rounded px-3 py-1.5 text-sm bg-white">
                        </div>
                    </div>
                </div>

                <!-- 4. Pengikut (Poin 8) -->
                <div class="bg-slate-50 p-3 rounded-lg border border-slate-200 space-y-2">
                    <div class="flex justify-between items-center">
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider">Daftar Pengikut (Poin 8)</label>
                        <button type="button" onclick="addPengikutRow()" class="bg-emerald-700 hover:bg-emerald-800 text-white text-xs font-bold px-2 py-1 rounded shadow transition cursor-pointer">+ Tambah</button>
                    </div>
                    <div id="pengikutInputsContainer" class="space-y-2">
                        <!-- Diinjeksi via JS -->
                    </div>
                </div>

                <!-- 5. Pembebanan Anggaran & PPK -->
                <div class="bg-slate-50 p-3 rounded-lg border border-slate-200 space-y-3">
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider">Anggaran & Otorisasi</label>
                    <div>
                        <label class="block text-xs text-slate-600">Instansi Pembebanan (DIPA)</label>
                        <input type="text" id="in_dipa" value="DIPA Kejaksaan Tinggi Maluku TA 2026" class="w-full border rounded px-3 py-1.5 text-sm bg-white">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-600">Mata Anggaran / Akun</label>
                        <input type="text" id="in_akun" value="524111" class="w-full border rounded px-3 py-1.5 text-sm font-mono bg-white">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs text-slate-600">Nama PPK</label>
                            <input type="text" id="in_ppk_nama" value="HELENA MAPUSSA, S.H., M.H." class="w-full border rounded px-3 py-1.5 text-sm bg-white">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-600">NIP PPK</label>
                            <input type="text" id="in_ppk_nip" value="198403152002122001" class="w-full border rounded px-3 py-1.5 text-sm font-mono bg-white">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs text-slate-600">Lokasi Satker Ttd</label>
                            <input type="text" id="in_lokasi_asal" value="Ambon" class="w-full border rounded px-3 py-1.5 text-sm bg-white">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-600">Tanggal Ttd Surat</label>
                            <input type="text" id="in_tgl_ttd" value="23 Januari 2026" class="w-full border rounded px-3 py-1.5 text-sm bg-white">
                        </div>
                    </div>
                </div>
            </form>
        </section>

        <!-- PANEL KANAN: LIVE PREVIEW DOKUMEN -->
        <section class="w-full lg:w-7/12 flex flex-col items-center overflow-y-auto max-h-[85vh] bg-slate-300 p-4 rounded-xl border border-slate-400">
            <div class="w-full max-w-[210mm] bg-white shadow-2xl p-[15mm] spd-document rounded-md mb-6 border border-slate-200" id="previewPage1">
                <!-- PAGE 1 INJECTED HERE -->
            </div>
            <div class="w-full max-w-[210mm] bg-white shadow-2xl p-[15mm] spd-document rounded-md border border-slate-200" id="previewPage2">
                <!-- PAGE 2 INJECTED HERE -->
            </div>
        </section>
    </main>

    <!-- AREA CETAK KHUSUS -->
    <div id="printContainer" class="hidden print-area mx-auto"></div>

    <footer class="bg-slate-800 text-slate-400 text-center py-2 text-xs border-t border-slate-700 no-print mt-auto">
        &copy; 2026 Kejaksaan Digital - Korps Adhyaksa Maluku Terstandardisasi PMK 113/PMK.05/2012[cite: 4]
    </footer>

    <script>
        let daftarPengikut = [
            { nama: "AMRI KURNIAWAN, S.H., M.H.", jabatan: "RIKSA PEGASUM", ket: "" },
            { nama: "JHON LEONARDO HUTAGALUNG, SH.,M.H.", jabatan: "RIKSA INTELIJEN", ket: "" },
            { nama: "RITA AKOLLO, S.H., M.Η.", jabatan: "RIKSA KEPBANG", ket: "" },
            { nama: "KAREL SAMPE, S.H., Μ.Η.", jabatan: "RIKSA PIDUM", ket: "" },
            { nama: "SYAMSU YONI SUPRAPTO, S.H.", jabatan: "RIKSA PIDSUS", ket: "" },
            { nama: "FITRIANY KELWOUW, S.H.", jabatan: "AUDITOR", ket: "" },
            { nama: "HUSEN, SE., CFrA", jabatan: "AUDITOR", ket: "" },
            { nama: "JAKRIZAL BAIHAQI TUHAREA", jabatan: "PENJAGA TAHANAN", ket: "" }
        ];

        function renderPengikutInputs() {
            const container = document.getElementById('pengikutInputsContainer');
            container.innerHTML = '';
            daftarPengikut.forEach((p, idx) => {
                const row = document.createElement('div');
                row.className = 'flex gap-1 items-center bg-white p-1.5 rounded border border-slate-200 shadow-sm';
                row.innerHTML = `
                    <span class="text-xs font-mono font-bold bg-slate-200 px-1.5 py-1 rounded text-slate-600">${idx+1}</span>
                    <input type="text" value="${p.nama}" placeholder="Nama Lengkap & Gelar" oninput="updatePengikutData(${idx}, 'nama', this.value)" class="flex-1 text-xs border rounded p-1">
                    <input type="text" value="${p.jabatan}" placeholder="Jabatan/Fungsional" oninput="updatePengikutData(${idx}, 'jabatan', this.value)" class="w-1/3 text-xs border rounded p-1">
                    <button type="button" onclick="removePengikutRow(${idx})" class="text-red-500 hover:text-red-700 font-bold px-1 text-sm">✕</button>
                `;
                container.appendChild(row);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const cache = localStorage.getItem('sppd_data_cache');
            if (cache) {
                const data = JSON.parse(cache);
                if(document.getElementById('in_satuan_kerja')) document.getElementById('in_satuan_kerja').value = data.satuan_kerja || "Kejaksaan Tinggi Maluku";
                if(document.getElementById('in_nomor')) document.getElementById('in_nomor').value = data.nomor || "SPPD-024/PPK/01/2026";
                if(document.getElementById('in_nama_pegawai')) document.getElementById('in_nama_pegawai').value = data.nama_pegawai || "LUTHER KURNIAWAN, S.H., M.H.";
                if(document.getElementById('in_nip_utama')) document.getElementById('in_nip_utama').value = data.nip_utama || "197405082000031002";
                if(document.getElementById('in_pangkat_utama')) document.getElementById('in_pangkat_utama').value = data.pangkat_utama || "Jaksa Madya (IV/a)";
                if(document.getElementById('in_jabatan_utama')) document.getElementById('in_jabatan_utama').value = data.jabatan_utama || "Asisten Bidang Pengawasan Kejaksaan Tinggi Maluku";
                if(document.getElementById('in_biaya_utama')) document.getElementById('in_biaya_utama').value = data.biaya_utama || "C";
                if(document.getElementById('in_maksud')) document.getElementById('in_maksud').value = data.maksud || "";
                if(document.getElementById('in_angkutan')) document.getElementById('in_angkutan').value = data.angkutan || "Pesawat - Mobil";
                if(document.getElementById('in_asal')) document.getElementById('in_asal').value = data.asal || "Ambon";
                if(document.getElementById('in_tujuan')) document.getElementById('in_tujuan').value = data.tujuan || "Kejaksaan Negeri Buru - Namlea";
                if(document.getElementById('in_lama')) document.getElementById('in_lama').value = data.lama || "3 (tiga) Hari";
                if(document.getElementById('in_tgl_berangkat')) document.getElementById('in_tgl_berangkat').value = data.tgl_berangkat || "26  Januari 2026";
                if(document.getElementById('in_tgl_kembali')) document.getElementById('in_tgl_kembali').value = data.tgl_kembali || "28 Januari 2026";
                if(document.getElementById('in_dipa')) document.getElementById('in_dipa').value = data.dipa || "DIPA Kejaksaan Tinggi Maluku TA 2026";
                if(document.getElementById('in_akun')) document.getElementById('in_akun').value = data.akun || "524111";
                if(document.getElementById('in_ppk_nama')) document.getElementById('in_ppk_nama').value = data.ppk_nama || "HELENA MAPUSSA, S.H., M.H.";
                if(document.getElementById('in_ppk_nip')) document.getElementById('in_ppk_nip').value = data.ppk_nip || "198403152002122001";
                if(document.getElementById('in_lokasi_asal')) document.getElementById('in_lokasi_asal').value = data.lokasi_satker_asal || "Ambon";
                if(document.getElementById('in_tgl_ttd')) document.getElementById('in_tgl_ttd').value = data.tgl_ttd || "23 Januari 2026";
                daftarPengikut = data.pengikut || [];
            }
            
            renderPengikutInputs();
            updateDocumentView();
            
            const allInputs = document.querySelectorAll('#sppdForm input, #sppdForm textarea');
            allInputs.forEach(input => {
                input.addEventListener('input', () => {
                    updateDocumentView();
                });
            });
        });

        function addPengikutRow() {
            daftarPengikut.push({ nama: '', jabatan: '', ket: '' });
            renderPengikutInputs();
            updateDocumentView();
        }

        function removePengikutRow(idx) {
            daftarPengikut.splice(idx, 1);
            renderPengikutInputs();
            updateDocumentView();
        }

        function updatePengikutData(idx, field, val) {
            daftarPengikut[idx][field] = val;
            updateDocumentView();
        }

        function updateDocumentView() {
            const satuan_kerja = document.getElementById('in_satuan_kerja').value;
            const nomor = document.getElementById('in_nomor').value;
            const nama_pegawai = document.getElementById('in_nama_pegawai').value;
            const nip_utama = document.getElementById('in_nip_utama').value;
            const pangkat_utama = document.getElementById('in_pangkat_utama').value;
            const jabatan_utama = document.getElementById('in_jabatan_utama').value;
            const biaya_utama = document.getElementById('in_biaya_utama').value;
            const maksud = document.getElementById('in_maksud').value;
            const angkutan = document.getElementById('in_angkutan').value;
            const asal = document.getElementById('in_asal').value;
            const tujuan = document.getElementById('in_tujuan').value;
            const lama = document.getElementById('in_lama').value;
            const tgl_berangkat = document.getElementById('in_tgl_berangkat').value;
            const tgl_kembali = document.getElementById('in_tgl_kembali').value;
            const dipa = document.getElementById('in_dipa').value;
            const akun = document.getElementById('in_akun').value;
            const ppk_nama = document.getElementById('in_ppk_nama').value;
            const ppk_nip = document.getElementById('in_ppk_nip').value;
            const lokasi_satker_asal = document.getElementById('in_lokasi_asal').value;
            const tgl_ttd = document.getElementById('in_tgl_ttd').value;

            const warningEl = document.getElementById('nip_warning');
            if (warningEl) warningEl.textContent = validasiNIP(nip_utama);

            let pengikutRowsHtml = '';
            if (daftarPengikut.length === 0) {
                pengikutRowsHtml = `<tr><td colspan="4" class="text-center italic py-2">Tidak ada pengikut</td></tr>`;
            } else {
                daftarPengikut.forEach((p, i) => {
                    pengikutRowsHtml += `
                        <tr>
                            <td style="text-align: center; width: 5%; border: 1px solid #000;">${i + 1}.</td>
                            <td style="width: 45%; font-weight: bold; border: 1px solid #000;">${p.nama || '-'}</td>
                            <td style="width: 30%; border: 1px solid #000;">${p.jabatan || '-'}</td>
                            <td style="width: 20%; border: 1px solid #000;">${p.ket || ''}</td>
                        </tr>
                    `;
                });
            }

            const page1Html = `
                <div class="w-full flex justify-between items-start border-bottom pb-2 mb-4" style="border-bottom: 2px solid #000000; display: flex; justify-content: space-between;">
                    <div>
                        <div style="font-weight: bold; font-size: 10pt; text-transform: uppercase;">KEMENTERIAN / LEMBAGA</div>
                        <div style="font-weight: bold; font-size: 11pt; letter-spacing: 0.5px;">${satuan_kerja}</div>
                        <div style="font-size: 7.5pt; color: #444444; margin-top: 5px; max-width: 350px; line-height: 1.1;">
                            LAMPIRAN I PERATURAN MENTERI KEUANGAN INDONESIA NOMOR: 113/PMK.05/2012 TENTANG PERJALANAN DINAS JABATAN DALAM NEGERI BAGI PEJABAT NEGARA, PEGAWAI NEGERI DAN PEGAWAI TIDAK TETAP
                        </div>
                    </div>
                    <div style="font-size: 9.5pt; font-family: monospace; text-align: left; border-left: 1px solid #ccc; padding-left: 10px;">
                        <div>LEMBARAN :</div>
                        <div>KODE     :</div>
                        <div>NOMOR    : ${nomor}</div>
                    </div>
                </div>
                <div style="text-align: center; margin: 15px 0 20px 0;"><span style="font-weight: bold; font-size: 13pt; border-bottom: 1.5px solid #000000;">SURAT PERJALANAN DINAS (SPD)</span></div>
                <table class="spd-table-main" style="width: 100%; margin-bottom: 15px;">
                    <tr><td style="width: 4%;">1.</td><td style="width: 40%;">Pejabat Pembuat Komitmen</td><td style="width: 2%;">:</td><td style="width: 54%; font-weight: bold;">${ppk_nama}</td></tr>
                    <tr style="border-top: 1px solid #eee;"><td>2.</td><td>Nama/NIP Pegawai yang melaksanakan Perjalanan Dinas</td><td>:</td><td style="font-weight: bold;">${nama_pegawai} / NIP. ${nip_utama}</td></tr>
                    <tr style="border-top: 1px solid #eee;"><td>3.</td><td>a. Pangkat dan Golongan<br>b. Jabatan / Instansi<br>c. Tingkat Biaya Perjalanan Dinas</td><td>:<br>:<br>:</td><td>a. ${pangkat_utama}<br>b. ${jabatan_utama}<br>c. ${biaya_utama}</td></tr>
                    <tr style="border-top: 1px solid #eee;"><td>4.</td><td>Maksud Perjalanan Dinas</td><td>:</td><td>${maksud}</td></tr>
                    <tr style="border-top: 1px solid #eee;"><td>5.</td><td>Alat angkutan yang dipergunakan</td><td>:</td><td>${angkutan}</td></tr>
                    <tr style="border-top: 1px solid #eee;"><td>6.</td><td>a. Tempat Berangkat<br>b. Tempat Tujuan</td><td>:<br>:</td><td>a. ${asal}<br>b. ${tujuan}</td></tr>

        // FUNGSI EKSPOR DIKUNCI 100% SESUAI VARIABEL TEMPLATE .DOCX TERBARU ANDA
        function downloadWord() {
            const nomorFile = document.getElementById('in_nomor').value.replace(/[\/\*?:|"<>]/g, '-');
            
            PizZipUtils.getBinaryContent("template.docx", function (error, content) {
                if (error) {
                    alert("Gagal memuat template.docx. Pastikan file sudah berada di repositori Anda.");
                    return;
                }

                const zip = new PizZip(content);
                const doc = new window.docxtemplater(zip, {
                    paragraphLoop: true,
                    linebreaks: true,
                });

                // INTEGRASI KAKU DENGAN VARIABEL TEMPLATE BARU (MEMASUKKAN KOREKSI TYPO TEMPLATE SECARA AMAN)
                const contextData = {
                    "satuan_kerja": document.getElementById('in_satuan_kerja').value, // Menjawab {satuan_kerja}
                    "nomor": document.getElementById('in_nomor').value,              // Menjawab {nomor} (Huruf kecil)
                    "ppk_nama": document.getElementById('in_ppk_nama').value,          // Menjawab {ppk_nama}
                    
                    // Poin 2: Menjawab {nama_pegawai} & {nip_utama}
                    "nama_pegawai": document.getElementById('in_nama_pegawai').value,
                    "nip_utama": document.getElementById('in_nip_utama').value,        
                    "nip_utama)": document.getElementById('in_nip_utama').value,       // Toleransi typo PDF "nip_utama)"
                    
                    "pangkat_utama": document.getElementById('in_pangkat_utama').value,  // Menjawab {pangkat_utama}
                    "jabatan_utama": document.getElementById('in_jabatan_utama').value,  
                    "jabatan_utama}": document.getElementById('in_jabatan_utama').value, // Toleransi typo PDF "jabatan_utama}"
                    
                    "biaya_utama": document.getElementById('in_biaya_utama').value,    
                    "biaya_utama}": document.getElementById('in_biaya_utama').value,   // Toleransi typo PDF "biaya_utama}"
                    
                    "maksud": document.getElementById('in_maksud').value,              // Menjawab {maksud}
                    "angkutan": document.getElementById('in_angkutan').value,          // Menjawab {angkutan}
                    
                    "asal": document.getElementById('in_asal').value,                  
                    "asal)": document.getElementById('in_asal').value,                  // Toleransi typo PDF "{asal)"
                    "asal ": document.getElementById('in_asal').value,                  // Toleransi spasi "{asal "
                    
                    "tujuan": document.getElementById('in_tujuan').value,              // Menjawab {tujuan}
                    "lama": document.getElementById('in_lama').value,                  // Menjawab {lama}
                    "tgl_berangkat": document.getElementById('in_tgl_berangkat').value,// Menjawab {tgl_berangkat}
                    
                    "tgl_kembali": document.getElementById('in_tgl_kembali').value,    
                    "tgl_kembali}": document.getElementById('in_tgl_kembali').value,   // Toleransi typo PDF "tgl_kembali}"
                    
                    "dipa": document.getElementById('in_dipa').value,                  
                    "dipa)": document.getElementById('in_dipa').value,                  // Toleransi typo PDF "{dipa)"
                    
                    "akun": document.getElementById('in_akun').value,                  
                    "akun ": document.getElementById('in_akun').value,                  // Toleransi spasi "{akun "
                    
                    "lokasi_satker_asal": document.getElementById('in_lokasi_asal').value, 
                    "lokasi_satker_asal}": document.getElementById('in_lokasi_asal').value, // Toleransi typo "lokasi_satker_asal}"
                    
                    "tgl_ttd": document.getElementById('in_tgl_ttd').value,            // Menjawab {tgl_ttd}
                    "ppk_nip": document.getElementById('in_ppk_nip').value,            // Menjawab {ppk_nip}
                    "ppk nama": document.getElementById('in_ppk_nama').value,          // Menjawab {ppk nama} (tanpa underscore di poin VIII)
                    "ppk nama ": document.getElementById('in_ppk_nama').value,         // Toleransi spasi "{ppk nama "
                    
                    // Pembacaan data tabel perulangan dinamis pengikut
                    "pengikut": daftarPengikut.map((p, index) => ({
                        no: index + 1,
                        nama: p.nama || '-',
                        jabatan: p.jabatan || '-',
                        ket: p.ket || ''
                    }))
                };

                try {
                    doc.render(contextData);
                    
                    const out = doc.getZip().generate({
                        type: "blob",
                        mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
                    });

                    const url = URL.createObjectURL(out);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `SPPD_${nomorFile}.docx`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    
                } catch (err) {
                    console.error(err);
                    alert("Terjadi kesalahan teknis saat melakukan render data ke berkas Word.");
                }
            });
        }
                
        function saveToLocalStorage() {
            const formData = {
                satuan_kerja: document.getElementById('in_satuan_kerja').value,
                nomor: document.getElementById('in_nomor').value,
                nama_pegawai: document.getElementById('in_nama_pegawai').value,
                nipUtama: document.getElementById('in_nip_utama').value,
                pangkatUtama: document.getElementById('in_pangkat_utama').value,
                jabatanUtama: document.getElementById('in_jabatan_utama').value,
                biayaUtama: document.getElementById('in_biaya_utama').value,
                maksud: document.getElementById('in_maksud').value,
                angkutan: document.getElementById('in_angkutan').value,
                asal: document.getElementById('in_asal').value,
                tujuan: document.getElementById('in_tujuan').value,
                lama: document.getElementById('in_lama').value,
                tglBerangkat: document.getElementById('in_tgl_berangkat').value,
                tglKembali: document.getElementById('in_tgl_kembali').value,
                dipa: document.getElementById('in_dipa').value,
                akun: document.getElementById('in_akun').value,
                ppkNama: document.getElementById('in_ppk_nama').value,
                ppkNip: document.getElementById('in_ppk_nip').value,
                lokasi_satker_asal: document.getElementById('in_lokasi_asal').value,
                tgl_ttd: document.getElementById('in_tgl_ttd').value,
                pengikut: daftarPengikut
            };
            localStorage.setItem('sppd_data_cache', JSON.stringify(formData));
        }

        function validasiNIP(nip) {
            const cleanNIP = nip.replace(/\s+/g, ''); 
            if (cleanNIP.length !== 18 && cleanNIP.length > 0) {
                return "⚠️ NIP harus berjumlah 18 digit!";
            }
            return "";
        }
    </script>
