<!DOCTYPE html>
<html lang="id">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.50.0/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.7/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.7/pizzip-utils.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Generator SPPD - Kejaksaan Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none !important; } .print-area { display: block !important; } }
        .spd-document { font-family: 'Arial', sans-serif; color: #000000; font-size: 10pt; line-height: 1.3; }
        .spd-border-table { border-collapse: collapse; width: 100%; }
        .spd-border-table th, .spd-border-table td { border: 1px solid #000; padding: 5px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">
    <header class="bg-emerald-800 text-white p-4 no-print shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-bold text-lg">KEJAKSAAN DIGITAL</h1>
            <div class="space-x-2">
                <button onclick="window.print()" class="bg-amber-500 px-4 py-2 rounded text-sm font-bold text-slate-900">Cetak</button>
                <button onclick="downloadWord()" class="bg-blue-600 px-4 py-2 rounded text-sm font-bold">Unduh Word (.docx)</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 flex flex-col lg:flex-row gap-6 no-print">
        <section class="w-full lg:w-5/12 bg-white rounded-xl shadow p-6 max-h-[85vh] overflow-y-auto">
            <form id="sppdForm" class="space-y-4">
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase">Metadata</label>
                    <input type="text" id="in_satuan_kerja" value="Kejaksaan Tinggi Maluku" class="w-full border p-2 text-sm">
                    <input type="text" id="in_nomor" value="SPPD-024/PPK/01/2026" class="w-full border p-2 text-sm">
                </div>
                <div id="pengikutInputsContainer" class="space-y-2"></div>
                <button type="button" onclick="addPengikutRow()" class="bg-emerald-600 text-white px-3 py-1 rounded text-xs">+ Tambah Pengikut</button>
            </form>
        </section>

        <section class="w-full lg:w-7/12 bg-slate-300 p-4 rounded-xl max-h-[85vh] overflow-y-auto">
            <div id="previewPage1" class="bg-white p-[15mm] spd-document min-h-[297mm] shadow-xl"></div>
        </section>
    </main>

    <script>
        let daftarPengikut = [{ nama: "AMRI KURNIAWAN", jabatan: "RIKSA", ket: "" }];

        function addPengikutRow() { daftarPengikut.push({ nama: '', jabatan: '', ket: '' }); renderInputs(); }
        
        function renderInputs() {
            const container = document.getElementById('pengikutInputsContainer');
            container.innerHTML = '';
            daftarPengikut.forEach((p, idx) => {
                container.innerHTML += `<div class="flex gap-1"><input value="${p.nama}" oninput="daftarPengikut[${idx}].nama=this.value" class="w-1/2 border p-1 text-xs"></div>`;
            });
        }

        function downloadWord() {
            // Memanggil file "template.docx" yang ada di repositori
            PizZipUtils.getBinaryContent("template.docx", function (error, content) {
                if (error) { alert("File template.docx tidak ditemukan di repositori!"); return; }
                const zip = new PizZip(content);
                const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });
                
                try {
                    doc.render({
                        "satuan_kerja": document.getElementById('in_satuan_kerja').value,
                        "nomor": document.getElementById('in_nomor').value,
                        "pengikut": daftarPengikut
                    });
                    const blob = doc.getZip().generate({ type: "blob" });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = "SPPD_Hasil.docx";
                    a.click();
                } catch (e) {
                    alert("Error Template: " + e.message);
                }
            });
        }
    </script>
</body>
</html>
