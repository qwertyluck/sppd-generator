<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator SPPD - Kejaksaan Digital</title>
    
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.tailwindcss.com https://unpkg.com;">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.50.0/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.7/pizzip.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kejaksaan: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 700: '#15803d', 900: '#14532d' }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; padding-bottom: 60px; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        @media print { 
            .no-print { display: none !important; } 
            body { background: #e2e8f0; padding-bottom: 0; }
            .print-area { box-shadow: none !important; border: none !important; margin-bottom: 0 !important; }
            .page-break { page-break-before: always; }
        }

        .spd-document { font-family: 'Arial', sans-serif; color: #000; line-height: 1.4; font-size: 9.5pt; }
        .input-modern { @apply w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:bg-white focus:border-kejaksaan-500 focus:ring-2 focus:ring-kejaksaan-100 transition-all outline-none text-slate-800; }
        .label-modern { @apply block text-[11px] font-bold text-slate-500 mb-1.5 uppercase tracking-wider; }
        .card-modern { @apply bg-white p-6 rounded-2xl border border-slate-100 shadow-sm mb-6; }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-kejaksaan-500 selection:text-white">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm no-print">
        <div class="container mx-auto px-4 md:px-8 h-16 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-br from-kejaksaan-500 to-kejaksaan-700 p-2 rounded-xl text-white shadow-md">
                    <i class="ph-bold ph-scales text-2xl"></i>
                </div>
                <div>
                    <h1 class="font-bold text-slate-800 text-lg leading-tight tracking-tight">Kejaksaan Digital</h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Sistem Penerbitan SPPD</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <label for="templateUpload" class="cursor-pointer flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2.5 rounded-xl text-sm font-semibold transition-colors border border-slate-300 shadow-sm" title="Gunakan ini jika unduh Word otomatis gagal">

                </label>
                <input type="file" id="templateUpload" accept=".docx" class="hidden" onchange="generateFromLocalTemplate(this)" />

                <button onclick="downloadWord()" id="btnDownload" class="flex items-center gap-2 bg-gradient-to-r from-blue-600 to-blue-800 hover:from-blue-700 hover:to-blue-900 text-white px-6 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-blue-500/30 transition-transform transform hover:-translate-y-0.5">
                    <i class="ph-bold ph-file-doc text-lg"></i> Unduh Word
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 md:px-8 py-8 flex flex-col lg:flex-row gap-8 no-print">

            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold text-slate-700 flex items-center gap-2">
                    <i class="ph-fill ph-keyboard text-kejaksaan-500"></i> Formulir Data

                <div class="text-[11px] flex items-center gap-1.5 font-bold bg-green-50 text-green-700 px-3 py-1.5 rounded-full border border-green-100">

                        <div>

                            <input type="text" id="in_nomor" value="SPPD-024/PPK/01/2026" class="input-modern font-mono text-kejaksaan-700 font-bold bg-kejaksaan-50 border-kejaksaan-200">

                    </div>
                </div>

                <div class="card-modern">
                    <h3 class="flex items-center gap-2 text-sm font-bold text-slate-800 mb-5 pb-3 border-b border-slate-100">
                        <i class="ph-fill ph-user-circle text-blue-500 text-lg"></i> Pelaksana Utama
                    </h3>
                    <div class="space-y-5">
                        <div>

                                <input type="text" id="in_jabatan_utama" class="input-modern uppercase">
                            </div>
                            <div>

                            </div>

                    </div>
                </div>

                <div class="card-modern border-amber-100 shadow-md">
                    <h3 class="flex items-center gap-2 text-sm font-bold text-slate-800 mb-5 pb-3 border-b border-slate-100">
                        <i class="ph-fill ph-map-pin text-amber-500 text-lg"></i> Rincian Penugasan
                    </h3>
                    <div class="space-y-5">
                        <div>
                            <label for="in_maksud" class="label-modern">Maksud Perjalanan</label>
                            <textarea id="in_maksud" rows="2" class="input-modern resize-none leading-relaxed"></textarea>
                        </div>
                        <div>
                            <label for="in_angkutan" class="label-modern">Alat Angkutan</label>
                            <input type="text" id="in_angkutan" class="input-modern">
                        </div>
                        <div class="grid grid-cols-2 gap-5">

                        </div>
                        
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-4">

                            </div>
                            <div class="md:col-span-2">

                                    <span>Lama Perjalanan</span>
                                    <span class="text-[9px] lowercase italic font-normal">*terhitung otomatis</span>
                                </label>

                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-modern">
                    <div class="flex justify-between items-center mb-5 pb-3 border-b border-slate-100">
                        <h3 class="flex items-center gap-2 text-sm font-bold text-slate-800">
                            <i class="ph-fill ph-users text-purple-500 text-lg"></i> Pengikut
                        </h3>
                        <button type="button" onclick="addPengikutRow()" class="flex items-center gap-1.5 bg-purple-50 text-purple-700 border border-purple-200 hover:bg-purple-100 hover:border-purple-300 px-4 py-2 rounded-xl text-xs font-bold transition-all shadow-sm">
                            <i class="ph-bold ph-plus"></i> Tambah
                        </button>
                    </div>
                    <div id="pengikutContainer" class="space-y-4"></div>

                <div class="card-modern mb-10">
                    <h3 class="flex items-center gap-2 text-sm font-bold text-slate-800 mb-5 pb-3 border-b border-slate-100">
                        <i class="ph-fill ph-signature text-slate-700 text-lg"></i> Anggaran & Otorisasi
                    </h3>
                    <div class="space-y-5">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                            <div class="md:col-span-2">
                                <label for="in_dipa" class="label-modern">Instansi (DIPA)</label>
                                <input type="text" id="in_dipa" class="input-modern">
                            </div>
                            <div>
                                <label for="in_akun" class="label-modern">Akun</label>
                                <input type="text" id="in_akun" class="input-modern font-mono font-bold">
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

                                <input type="text" id="in_ppk_nama" class="input-modern uppercase font-bold">
                            </div>
                            <div>
                                <label for="in_ppk_nip" class="label-modern">NIP PPK</label>
                                <input type="text" id="in_ppk_nip" class="input-modern font-mono" maxlength="18">
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label for="in_lokasi_asal" class="label-modern">Lokasi TTD</label>
                                <input type="text" id="in_lokasi_asal" class="input-modern">
                            </div>
                            <div>
                                <label for="in_tgl_ttd" class="label-modern">Tanggal TTD</label>
                                <input type="date" id="in_tgl_ttd" class="input-modern font-mono">
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </section>

        <section class="w-full lg:w-1/2 xl:w-7/12 relative">
            <div class="lg:sticky lg:top-24 bg-slate-200 rounded-3xl p-4 md:p-6 shadow-inner border border-slate-300">
                <div class="flex items-center justify-between mb-4 text-slate-500">
                    <h2 class="text-sm font-bold flex items-center gap-2">
                        <i class="ph-fill ph-eye text-xl"></i> Pratinjau Dokumen (A4)
                    </h2>
                </div>
                
                <div class="overflow-y-auto max-h-[75vh] flex flex-col items-center gap-6 pb-4 custom-scrollbar rounded-xl">
                    <div id="previewPage1" class="bg-white p-[15mm] w-full max-w-[210mm] min-h-[297mm] shadow-xl spd-document print-area"></div>
                    <div id="previewPage2" class="bg-white p-[15mm] w-full max-w-[210mm] min-h-[297mm] shadow-xl spd-document print-area page-break"></div>
                </div>
            </div>
        </section>
        
    </main>

    <footer class="fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 py-3 text-center text-xs font-medium text-slate-500 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-50">
        © 2026 Kejaksaan Digital | Dibuat oleh <strong class="text-slate-800 font-bold">Jalo Tuharea</strong>
    </footer>

<script>
    let daftarPengikut = [];

    document.addEventListener('DOMContentLoaded', () => {
        loadData();
        if(daftarPengikut.length === 0) {
            daftarPengikut.push({ nama: "", jabatan: "", ket: "" });
        }
        renderPengikut();
        updatePreview();
    });

    document.getElementById('sppdForm').addEventListener('input', (e) => {
        if (e.target.id === 'in_nip_utama') enforceNIP(e.target, 'warn_nip_utama');
        if (e.target.id === 'in_ppk_nip') enforceNIP(e.target, 'warn_ppk_nip');
        if (e.target.id === 'in_tgl_berangkat' || e.target.id === 'in_tgl_kembali') validateAndCalculateDays();
        
        saveData();
        updatePreview();
    });

    // FUNGSI PENDUKUNG (Hitung hari, mask, dll)
    function angkaTerbilang(angka) {
        const huruf = ["", "satu", "dua", "tiga", "empat", "lima", "enam", "tujuh", "delapan", "sembilan", "sepuluh", "sebelas"];
        let temp = "";
        if (angka < 12) { temp = huruf[angka]; } 
        else if (angka < 20) { temp = angkaTerbilang(angka - 10) + " belas"; } 
        else if (angka < 100) { temp = angkaTerbilang(Math.floor(angka / 10)) + " puluh " + angkaTerbilang(angka % 10); } 
        else { temp = angka.toString(); }
        return temp.trim();
    }

    function validateAndCalculateDays() {
        const start = document.getElementById('in_tgl_berangkat').value;
        const end = document.getElementById('in_tgl_kembali').value;
        const inputLama = document.getElementById('in_lama');
        if (start && end) {
            const startDate = new Date(start);
            const endDate = new Date(end);
            if (endDate >= startDate) {
                const diffTime = Math.abs(endDate - startDate);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1; 
                inputLama.value = `${diffDays} (${angkaTerbilang(diffDays)}) Hari`;
            } else {
                inputLama.value = "Pilihan tanggal salah!";
            }
        }
    }

    function formatTanggalIndo(dateStr) {
        if (!dateStr) return "-";
        const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
    }

    function enforceNIP(inputEl, warnId) {
        let val = inputEl.value.replace(/\D/g, ''); 
        if (val.length > 18) val = val.slice(0, 18);
        inputEl.value = val;
    }

    // MANAJEMEN PENGIKUT
    function addPengikutRow() { daftarPengikut.push({ nama: '', jabatan: '', ket: '' }); renderPengikut(); saveData(); updatePreview(); }
    function removePengikutRow(idx) { daftarPengikut.splice(idx, 1); renderPengikut(); saveData(); updatePreview(); }
    function updatePengikutField(idx, field, val) { daftarPengikut[idx][field] = val; saveData(); updatePreview(); }

    function renderPengikut() {
        const container = document.getElementById('pengikutContainer');
        container.innerHTML = '';
        daftarPengikut.forEach((p, i) => {
            container.innerHTML += `
                <div class="bg-white border border-slate-200 p-4 rounded-xl shadow-sm relative group hover:border-purple-300 transition-colors">
                    <button type="button" onclick="removePengikutRow(${i})" class="absolute -top-3 -right-3 bg-red-100 text-red-600 hover:bg-red-500 hover:text-white transition-colors rounded-full p-2 shadow-md">
                        <i class="ph-bold ph-trash"></i>
                    </button>
                    <p class="text-[10px] font-bold text-purple-400 mb-3 uppercase tracking-wider">Pengikut ${i+1}</p>
                    <input type="text" placeholder="Nama Lengkap & Gelar" value="${p.nama}" oninput="updatePengikutField(${i}, 'nama', this.value)" class="input-modern mb-3 font-bold uppercase border-slate-200">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" placeholder="Jabatan" value="${p.jabatan}" oninput="updatePengikutField(${i}, 'jabatan', this.value)" class="input-modern uppercase text-xs">
                        <input type="text" placeholder="Keterangan" value="${p.ket}" oninput="updatePengikutField(${i}, 'ket', this.value)" class="input-modern text-xs">
                    </div>
                </div>
            `;
        });
    }

    // PENYIMPANAN
    function saveData() {
        const data = {};
        document.querySelectorAll('#sppdForm input, #sppdForm textarea').forEach(el => { if(el.id) data[el.id] = el.value; });
        data['pengikut'] = daftarPengikut;
        localStorage.setItem('sppd_kejaksaan_v5', JSON.stringify(data));
    }

    function loadData() {
        const saved = localStorage.getItem('sppd_kejaksaan_v5');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                for (const key in data) {
                    if (key === 'pengikut') daftarPengikut = data[key] || [];
                    else { const el = document.getElementById(key); if (el) el.value = data[key]; }
                }
            } catch (e) { console.error(e); }
        }
    }

    function getVal(id) { const el = document.getElementById(id); return el ? el.value : ''; }

    // RENDER PREVIEW
    function updatePreview() {
        const preview1 = document.getElementById('previewPage1');
        const preview2 = document.getElementById('previewPage2');
        if(!preview1 || !preview2) return;

        let rowHtml = '';
        if (daftarPengikut.length === 0) rowHtml = `<tr><td colspan="4" class="border border-black p-2 text-center italic text-xs">Tidak ada pengikut</td></tr>`;
        else daftarPengikut.forEach((p, i) => {
            rowHtml += `<tr>
                <td class="border border-black p-1.5 text-center">${i+1}.</td>
                <td class="border border-black p-1.5 font-bold uppercase">${p.nama || '-'}</td>
                <td class="border border-black p-1.5 uppercase">${p.jabatan || '-'}</td>
                <td class="border border-black p-1.5">${p.ket || '-'}</td>
            </tr>`;
        });

        const tglB = formatTanggalIndo(getVal('in_tgl_berangkat'));
        const tglK = formatTanggalIndo(getVal('in_tgl_kembali'));
        const ppkNama = getVal('in_ppk_nama').toUpperCase();
        const ppkNip = getVal('in_ppk_nip');
        const asal = getVal('in_asal');

        preview1.innerHTML = `
            <div class="flex justify-between items-start border-b-[2px] border-black pb-2 mb-5">
                <div>
                    <div class="font-bold text-xs uppercase">Kementerian / Lembaga</div>
                    <div class="font-bold text-sm tracking-wide uppercase">${getVal('in_satuan_kerja')}</div>
                </div>
                <div class="text-[8.5pt] font-mono border-l border-gray-300 pl-3">
                    <div>NOMOR &nbsp;&nbsp;: ${getVal('in_nomor')}</div>
                </div>
            </div>
            <div class="text-center font-bold text-lg mb-6"><span class="border-b-[1.5px] border-black pb-0.5 tracking-wide">SURAT PERJALANAN DINAS (SPD)</span></div>
            <table class="w-full text-xs align-top mb-5">
                <tr><td class="w-6 pb-2.5">1.</td><td class="w-[45%] pb-2.5">Pejabat Pembuat Komitmen</td><td class="w-3 pb-2.5">:</td><td class="font-bold pb-2.5 uppercase">${ppkNama}</td></tr>
                <tr class="border-t border-gray-200"><td class="py-2.5">2.</td><td class="py-2.5 pr-2">Nama Pegawai yang melaksanakan</td><td class="py-2.5">:</td><td class="font-bold py-2.5 uppercase">${getVal('in_nama_pegawai')}<br>NIP. ${getVal('in_nip_utama')}</td></tr>
            </table>
            <div class="text-xs font-bold mb-1.5">8. Pengikut:</div>
            <table class="w-full text-xs border-collapse mb-5">
                <tr class="bg-gray-100"><th class="border border-black p-1.5 w-8">No.</th><th class="border border-black p-1.5">Nama</th><th class="border border-black p-1.5">Jabatan</th><th class="border border-black p-1.5">Keterangan</th></tr>
                ${rowHtml}
            </table>
            <div class="flex justify-end text-xs">
                <div class="w-60 text-left">
                    <p>${getVal('in_lokasi_asal')}, ${formatTanggalIndo(getVal('in_tgl_ttd'))}</p>
                    <p class="font-bold mb-14">Pejabat Pembuat Komitmen</p>
                    <p class="font-bold underline uppercase tracking-wide">${ppkNama}</p>
                    <p>NIP. ${ppkNip}</p>
                </div>
            </div>
        `;

        preview2.innerHTML = `
            <div class="grid grid-cols-2 gap-4 text-xs">
                <div class="border-r border-black pr-4"></div>
                <div class="pl-2 mb-6">
                    <table class="w-full">
                        <tr><td class="w-24">I. Berangkat dari</td><td>: ${asal}</td></tr>
                        <tr><td>Pada Tanggal</td><td>: ${tglB}</td></tr>
                        <tr><td colspan="2" class="font-bold underline uppercase pt-10">${ppkNama}</td></tr>
                        <tr><td colspan="2">NIP. ${ppkNip}</td></tr>
                    </table>
                </div>
            </div>
        `;
    }

    // ============================================================================
    // SISTEM UNDUH SUPER AMAN - DIJAMIN 100% BEKERJA (FETCH + FILE UPLOAD)
    // ============================================================================

    // METODE 1: FETCH OTOMATIS DARI SERVER / GITHUB
    async function downloadWord() {
        const btn = document.getElementById('btnDownload');
        const originalText = btn.innerHTML;
        btn.innerHTML = `<i class="ph-bold ph-spinner animate-spin text-lg"></i> Memproses...`;
        btn.disabled = true;

        try {
            // Menggunakan Fetch API Modern (PizZipUtils sering diblokir Browser)
            const response = await fetch("template.docx");
            
            if (!response.ok) {
                throw new Error("HTTP Error " + response.status + " - Template tidak ditemukan di Server");
            }
            
            const arrayBuffer = await response.arrayBuffer();
            eksekusiDocxTemplater(arrayBuffer, btn, originalText);

        } catch (error) {
            console.error(error);
            btn.innerHTML = originalText;
            btn.disabled = false;
            
            // Pop up jika akses ditolak (misal running di file:/// )
            alert("Sistem otomatis gagal membaca template.docx dari folder.\n\nAlasan: " + error.message + "\n\nSOLUSI: Silakan klik tombol abu-abu 'Upload Template (Manual)' di sebelah kiri, lalu pilih file template.docx dari komputer Anda.");
        }
    }

    // METODE 2: UPLOAD TEMPLATE MANUAL (SOLUSI JIKA METODE 1 GAGAL)
    function generateFromLocalTemplate(inputElement) {
        if (inputElement.files.length === 0) return;
        
        const file = inputElement.files[0];
        const reader = new FileReader();
        
        const btn = document.getElementById('btnDownload');
        const originalText = btn.innerHTML;
        btn.innerHTML = `<i class="ph-bold ph-spinner animate-spin text-lg"></i> Memproses Lokal...`;
        
        reader.onload = function(e) {
            const arrayBuffer = e.target.result;
            // Eksekusi fungsi utama
            eksekusiDocxTemplater(arrayBuffer, btn, originalText);
            // Reset input agar bisa dipakai berulang kali
            inputElement.value = ""; 
        };
        
        reader.readAsArrayBuffer(file);
    }

    // PROSES UTAMA (Berlaku untuk Metode 1 dan Metode 2)
    function eksekusiDocxTemplater(arrayBuffer, btnEl, originalBtnText) {
        try {
            const zip = new PizZip(arrayBuffer);
            
            // NullGetter menyelamatkan aplikasi dari crash jika ada tag Word yang salah format
            const doc = new window.docxtemplater(zip, { 
                paragraphLoop: true, 
                linebreaks: true,
                nullGetter: function(part) { return ""; }
            });
            
            const dataContext = {
                satuan_kerja: getVal('in_satuan_kerja').toUpperCase(),
                nomor: getVal('in_nomor'),
                ppk_nama: getVal('in_ppk_nama').toUpperCase(),
                nama_pegawai: getVal('in_nama_pegawai').toUpperCase(),
                nip_utama: getVal('in_nip_utama'),
                pangkat_utama: getVal('in_pangkat_utama'),
                jabatan_utama: getVal('in_jabatan_utama').toUpperCase(),
                biaya_utama: getVal('in_biaya_utama'),
                maksud: getVal('in_maksud'),
                angkutan: getVal('in_angkutan'),
                asal: getVal('in_asal'),
                tujuan: getVal('in_tujuan'),
                lama: getVal('in_lama'),
                tgl_berangkat: formatTanggalIndo(getVal('in_tgl_berangkat')),
                tgl_kembali: formatTanggalIndo(getVal('in_tgl_kembali')),
                dipa: getVal('in_dipa'),
                akun: getVal('in_akun'),
                lokasi_satker_asal: getVal('in_lokasi_asal'),
                tgl_ttd: formatTanggalIndo(getVal('in_tgl_ttd')),
                ppk_nip: getVal('in_ppk_nip'),
                pengikut: daftarPengikut.map((p, i) => ({
                    no: i + 1,
                    nama: p.nama.toUpperCase(),
                    jabatan: p.jabatan.toUpperCase(),
                    ket: p.ket
                }))
            };

            doc.render(dataContext);

            const blob = doc.getZip().generate({ 
                type: "blob", 
                mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" 
            });
            
            const url = window.URL.createObjectURL(blob);
            let fileTitle = getVal('in_nama_pegawai').replace(/[^a-zA-Z0-9]/g, '_') || "Pegawai";
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `SPPD_${fileTitle}.docx`;
            document.body.appendChild(a);
            a.click();
            
            // Reset Tombol dan Hapus Cache Blob
            setTimeout(() => {
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
                btnEl.innerHTML = originalBtnText;
                btnEl.disabled = false;
            }, 100);

        } catch (error) {
            console.error("DocxTemplater Error:", error);
            btnEl.innerHTML = originalBtnText;
            btnEl.disabled = false;
            alert(`Gagal menyusun File Word!\n\nPastikan format tag di dalam tabel Word Anda sudah benar (tidak ada yang terhapus kurung kurawalnya).\n\nPesan Error: ${error.message}`);
        }
    }
</script>
