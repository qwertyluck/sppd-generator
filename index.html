<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator SPPD - Kejaksaan Digital</title>
    
    <!-- CSP Meta Tag -->
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.tailwindcss.com https://unpkg.com;">

    <!-- CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.50.0/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.7/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.7/pizzip-utils.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; padding-bottom: 50px; }
        .input-box { @apply w-full bg-white border border-slate-300 rounded-lg px-4 py-2.5 shadow-sm focus:border-green-500 focus:ring-2 focus:ring-green-100 transition-all outline-none text-slate-800 placeholder-slate-400; }
        .card { @apply bg-white p-6 rounded-2xl border border-slate-200 shadow-sm mb-6; }
        .spd-document { font-family: 'Arial', sans-serif; color: #000; line-height: 1.3; font-size: 10pt; }
        .preview-page { min-height: 297mm; background: white; padding: 15mm; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm no-print">
        <div class="container mx-auto px-6 h-16 flex justify-between items-center">
            <h1 class="font-bold text-lg text-slate-800">Kejaksaan Digital SPPD</h1>
            <button onclick="downloadWord()" id="btnDownload" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl font-bold text-sm shadow-md transition-all">
                Unduh Word (.docx)
            </button>
        </div>
    </header>

    <main class="container mx-auto px-6 py-8 flex flex-col lg:flex-row gap-8">
        
        <!-- PANEL INPUT -->
        <section class="lg:w-1/2">
            <form id="sppdForm" class="space-y-4">
                <div class="card">
                    <h2 class="text-sm font-bold text-slate-500 uppercase mb-4">Identitas Utama</h2>
                    <input type="text" id="in_satuan_kerja" value="Kejaksaan Tinggi Maluku" class="input-box mb-3" placeholder="Satuan Kerja">
                    <input type="text" id="in_nomor" value="SPPD-024/PPK/01/2026" class="input-box" placeholder="Nomor SPPD">
                </div>

                <div class="card">
                    <div class="flex justify-between mb-4">
                        <h2 class="text-sm font-bold text-slate-500 uppercase">Pengikut</h2>
                        <button type="button" onclick="addPengikutRow()" class="bg-green-600 text-white px-3 py-1 rounded text-xs font-bold hover:bg-green-700">+ Tambah</button>
                    </div>
                    <div id="pengikutInputsContainer" class="space-y-3"></div>
                </div>
            </form>
        </section>

        <!-- PANEL PREVIEW -->
        <section class="lg:w-1/2 overflow-auto max-h-[80vh]">
            <div id="previewPage1" class="preview-page spd-document"></div>
            <div id="previewPage2" class="preview-page spd-document"></div>
        </section>
    </main>

    <!-- FOOTER COPYRIGHT -->
    <footer class="fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 py-3 text-center text-xs font-medium text-slate-500 z-50">
        © 2026 Kejaksaan Digital | Dibuat oleh <strong class="text-slate-800">Jalo Tuharea</strong>
    </footer>

    <script>
        let daftarPengikut = [{ nama: "AMRI KURNIAWAN, S.H., M.H.", jabatan: "RIKSA PEGASUM", ket: "" }];

        function downloadWord() {
            const btn = document.getElementById('btnDownload');
            btn.innerHTML = "Memproses...";
            btn.disabled = true;

            PizZipUtils.getBinaryContent("template.docx", function (error, content) {
                if (error) { btn.innerHTML = "Unduh Word"; btn.disabled = false; alert("File template.docx tidak ditemukan!"); return; }
                
                try {
                    const zip = new PizZip(content);
                    const doc = new window.docxtemplater(zip, { 
                        paragraphLoop: true, 
                        linebreaks: true,
                        nullGetter: () => "" // Mencegah crash jika tag rusak
                    });
                    
                    doc.render({
                        "satuan_kerja": document.getElementById('in_satuan_kerja').value,
                        "nomor": document.getElementById('in_nomor').value,
                        "pengikut": daftarPengikut
                    });
                    
                    const blob = doc.getZip().generate({ type: "blob", mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = "SPPD_Hasil.docx";
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    
                    btn.innerHTML = "Unduh Word (.docx)";
                    btn.disabled = false;
                } catch (e) {
                    btn.innerHTML = "Unduh Word (.docx)";
                    btn.disabled = false;
                    alert("Error! Pastikan tag {#pengikut} di Word Anda benar-benar sejajar dalam tabel. Pesan error: " + e.message);
                }
            });
        }

        // Fungsi Rendering
        function addPengikutRow() { daftarPengikut.push({ nama: '', jabatan: '', ket: '' }); renderInputs(); updatePreview(); }
        
        function renderInputs() { 
            const container = document.getElementById('pengikutInputsContainer');
            container.innerHTML = daftarPengikut.map((p, i) => `
                <div class="flex gap-2">
                    <input value="${p.nama}" oninput="daftarPengikut[${i}].nama=this.value; updatePreview()" class="input-box" placeholder="Nama Pegawai">
                </div>
            `).join('');
        }
        
        function updatePreview() {
            const satker = document.getElementById('in_satuan_kerja').value;
            const nomor = document.getElementById('in_nomor').value;
            document.getElementById('previewPage1').innerHTML = `
                <div class="font-bold text-lg mb-4">SURAT PERJALANAN DINAS</div>
                <p>Satker: ${satker}</p>
                <p>Nomor: ${nomor}</p>
                <table class="w-full mt-4 border-collapse border border-black">
                    ${daftarPengikut.map(p => `<tr><td class="border border-black p-2">${p.nama}</td></tr>`).join('')}
                </table>
            `;
            document.getElementById('previewPage2').innerHTML = `<p class="text-gray-500 italic">Halaman Visum & Tanda Tangan</p>`;
        }
        
        renderInputs();
        updatePreview();
    </script>
</body>
</html>
