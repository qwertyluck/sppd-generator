<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator SPPD - Kejaksaan Digital</title>
    
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.tailwindcss.com https://unpkg.com;">

    <script src="https://unpkg.com/pizzip@3.1.7/dist/pizzip.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.7/dist/pizzip-utils.js"></script>
    <script src="https://unpkg.com/docxtemplater@3.50.0/build/docxtemplater.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kejaksaan: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 700: '#15803d', 900: '#14532d' }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; padding-bottom: 70px; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        @media print { 
            .no-print { display: none !important; } 
            body { background: #e2e8f0; padding-bottom: 0; }
            .print-area { box-shadow: none !important; border: none !important; margin-bottom: 0 !important; }
            .page-break { page-break-before: always; }
        }

        .spd-document { font-family: 'Arial', sans-serif; color: #000; line-height: 1.4; font-size: 9.5pt; }
        
        /* FORM OUTLINE MODERN */
        .form-outline { @apply w-full bg-white border-2 border-slate-300 rounded-lg px-4 py-3 shadow-sm transition-all duration-200 focus:border-green-600 focus:ring-4 focus:ring-green-100 outline-none text-slate-800 font-medium; }
        .label-modern { @apply block text-[11px] font-bold text-slate-500 mb-1.5 uppercase tracking-wider; }
        .card-modern { @apply bg-white p-6 rounded-2xl shadow-lg border border-slate-200 mb-6; }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-kejaksaan-500 selection:text-white">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm no-print">
        <div class="container mx-auto px-4 md:px-8 h-16 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-br from-kejaksaan-500 to-kejaksaan-700 p-2 rounded-xl text-white shadow-md">
                    <i class="ph-bold ph-scales text-2xl"></i>
                </div>
                <div>
                    <h1 class="font-bold text-slate-800 text-lg leading-tight tracking-tight">Kejaksaan Digital</h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Sistem Penerbitan SPPD</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <label for="templateUpload" class="cursor-pointer flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2.5 rounded-xl text-sm font-semibold transition-colors border border-slate-300 shadow-sm" title="Gunakan ini jika unduh Word otomatis gagal">
                    <i class="ph-bold ph-upload-simple text-lg text-slate-500"></i> Manual Upload Template
                </label>
                <input type="file" id="templateUpload" accept=".docx" class="hidden" onchange="generateFromLocalTemplate(this)" />

                <button onclick="downloadWord()" id="btnDownload" class="flex items-center gap-2 bg-gradient-to-r from-blue-600 to-blue-800 hover:from-blue-700 hover:to-blue-900 text-white px-6 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-blue-500/30 transition-transform transform hover:-translate-y-0.5">
                    <i class="ph-bold ph-file-doc text-lg"></i> Unduh Word
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 md:px-8 py-8 flex flex-col lg:flex-row gap-8 no-print">
        
        <section class="w-full lg:w-1/2 xl:w-5/12 flex flex-col">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold text-slate-700 flex items-center gap-2">
                    <i class="ph-fill ph-keyboard text-kejaksaan-500"></i> Formulir Data
                </h2>
                <div class="text-[11px] flex items-center gap-1.5 font-bold bg-green-50 text-green-700 px-3 py-1.5 rounded-full border border-green-100">
                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div> Autosave Aktif
                </div>
            </div>
            
            <form id="sppdForm" class="space-y-6">
                
                <div class="card-modern">
                    <h3 class="flex items-center gap-2 text-sm font-bold text-slate-800 mb-4 pb-3 border-b border-slate-100">
                        <i class="ph-fill ph-identification-card text-kejaksaan-500 text-lg"></i> Identitas Surat
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label for="in_satuan_kerja" class="label-modern">Satuan Kerja</label>
                            <input type="text" id="in_satuan_kerja" value="Kejaksaan Tinggi Maluku" class="form-outline">
                        </div>
                        <div>
                            <label for="in_nomor" class="label-modern">Nomor SPPD</label>
                            <input type="text" id="in_nomor" value="SPPD-024/PPK/01/2026" class="form-outline font-mono">
                        </div>
                    </div>
                </div>

                <div class="card-modern">
                    <h3 class="flex items-center gap-2 text-sm font-bold text-slate-800 mb-4 pb-3 border-b border-slate-100">
                        <i class="ph-fill ph-user-circle text-blue-500 text-lg"></i> Pelaksana Utama
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label for="in_nama_pegawai" class="label-modern">Nama Pegawai</label>
                            <input type="text" id="in_nama_pegawai" class="form-outline uppercase">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label for="in_nip_utama" class="label-modern">NIP</label>
                                <input type="text" id="in_nip_utama" class="form-outline font-mono" maxlength="18">
                            </div>
                            <div>
                                <label for="in_pangkat_utama" class="label-modern">Pangkat/Golongan</label>
                                <input type="text" id="in_pangkat_utama" class="form-outline">
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-4">
                            <div class="col-span-2">
                                <label for="in_jabatan_utama" class="label-modern">Jabatan / Instansi</label>
                                <input type="text" id="in_jabatan_utama" class="form-outline uppercase">
                            </div>
                            <div>
                                <label for="in_biaya_utama" class="label-modern">Tgkt. Biaya</label>
                                <input type="text" id="in_biaya_utama" value="C" class="form-outline text-center">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-modern shadow-md">
                    <h3 class="flex items-center gap-2 text-sm font-bold text-slate-800 mb-4 pb-3 border-b border-slate-100">
                        <i class="ph-fill ph-map-pin text-amber-500 text-lg"></i> Rincian Penugasan
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label for="in_maksud" class="label-modern">Maksud Perjalanan</label>
                            <textarea id="in_maksud" rows="2" class="form-outline"></textarea>
                        </div>
                        <div>
                            <label for="in_angkutan" class="label-modern">Alat Angkutan</label>
                            <input type="text" id="in_angkutan" class="form-outline">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label for="in_asal" class="label-modern">Tempat Asal</label>
                                <input type="text" id="in_asal" class="form-outline">
                            </div>
                            <div>
                                <label for="in_tujuan" class="label-modern">Tempat Tujuan</label>
                                <input type="text" id="in_tujuan" class="form-outline">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label for="in_tgl_berangkat" class="label-modern text-kejaksaan-700">Tgl Berangkat</label>
                                <input type="date" id="in_tgl_berangkat" class="form-outline">
                            </div>
                            <div>
                                <label for="in_tgl_kembali" class="label-modern text-kejaksaan-700">Tgl Kembali</label>
                                <input type="date" id="in_tgl_kembali" class="form-outline">
                            </div>
                        </div>
                        <div>
                            <label for="in_lama" class="label-modern text-amber-600">Lama Perjalanan</label>
                            <input type="text" id="in_lama" class="form-outline bg-amber-50 font-bold" readonly>
                        </div>
                    </div>
                </div>

                <div class="card-modern">
                    <div class="flex justify-between items-center mb-4 pb-3 border-b border-slate-100">
                        <h3 class="flex items-center gap-2 text-sm font-bold text-slate-800">
                            <i class="ph-fill ph-users text-purple-500 text-lg"></i> Pengikut
                        </h3>
                        <button type="button" onclick="addPengikutRow()" class="bg-purple-600 text-white px-3 py-1 rounded text-xs font-bold">+ Tambah</button>
                    </div>
                    <div id="pengikutContainer" class="space-y-4"></div>
                </div>

                <div class="card-modern mb-10">
                    <h3 class="flex items-center gap-2 text-sm font-bold text-slate-800 mb-4 pb-3 border-b border-slate-100">
                        <i class="ph-fill ph-signature text-slate-700 text-lg"></i> Anggaran & Otorisasi
                    </h3>
                    <div class="space-y-4">
                        <div class="grid grid-cols-3 gap-4">
                            <div class="col-span-2">
                                <label for="in_dipa" class="label-modern">Instansi (DIPA)</label>
                                <input type="text" id="in_dipa" class="form-outline">
                            </div>
                            <div>
                                <label for="in_akun" class="label-modern">Akun</label>
                                <select id="in_akun" class="form-outline text-xs">
                                    <option value="524113">524113 (P.D. Dalam Kota/Biasa)</option>
                                    <option value="524114">524114 (P.D. Dalam Kota)</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label for="in_ppk_nama" class="label-modern">Nama PPK</label>
                                <input type="text" id="in_ppk_nama" class="form-outline uppercase">
                            </div>
                            <div>
                                <label for="in_ppk_nip" class="label-modern">NIP PPK</label>
                                <input type="text" id="in_ppk_nip" class="form-outline font-mono" maxlength="18">
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </section>

        <section class="w-full lg:w-1/2 xl:w-7/12 relative">
            <div class="lg:sticky lg:top-24 bg-slate-200 rounded-3xl p-6 shadow-inner border border-slate-300">
                <h2 class="text-sm font-bold mb-4 text-slate-600 flex items-center gap-2"><i class="ph-fill ph-eye text-xl"></i> Pratinjau Dokumen</h2>
                <div class="overflow-y-auto max-h-[75vh] flex flex-col items-center gap-6 pb-4 custom-scrollbar rounded-xl">
                    <div id="previewPage1" class="bg-white p-[15mm] w-full max-w-[210mm] min-h-[297mm] shadow-xl spd-document"></div>
                    <div id="previewPage2" class="bg-white p-[15mm] w-full max-w-[210mm] min-h-[297mm] shadow-xl spd-document"></div>
                </div>
            </div>
        </section>
        
    </main>

    <footer class="fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 py-3 text-center text-xs font-medium text-slate-500 z-50">
        © 2026 Kejaksaan Digital | Dibuat oleh <strong class="text-slate-800 font-bold">Jalo Tuharea</strong>
    </footer>

<script>
    // FUNGSI JAVASCRIPT (Sama seperti logika sebelumnya, memastikan kompatibilitas)
    let daftarPengikut = [];
    document.addEventListener('DOMContentLoaded', () => { loadData(); renderPengikut(); updatePreview(); });
    document.getElementById('sppdForm').addEventListener('input', () => { validateAndCalculateDays(); saveData(); updatePreview(); });

    function angkaTerbilang(angka) {
        const huruf = ["", "satu", "dua", "tiga", "empat", "lima", "enam", "tujuh", "delapan", "sembilan", "sepuluh", "sebelas"];
        if (angka < 12) return huruf[angka];
        if (angka < 20) return angkaTerbilang(angka - 10) + " belas";
        if (angka < 100) return angkaTerbilang(Math.floor(angka / 10)) + " puluh " + angkaTerbilang(angka % 10);
        return angka.toString();
    }

    function validateAndCalculateDays() {
        const start = document.getElementById('in_tgl_berangkat').value;
        const end = document.getElementById('in_tgl_kembali').value;
        const inputLama = document.getElementById('in_lama');
        if (start && end) {
            const diffDays = Math.ceil((new Date(end) - new Date(start)) / (1000 * 60 * 60 * 24)) + 1;
            inputLama.value = diffDays > 0 ? `${diffDays} (${angkaTerbilang(diffDays)}) Hari` : "Tanggal Salah!";
        }
    }

    function formatTanggalIndo(dateStr) {
        if (!dateStr) return "-";
        const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        const d = new Date(dateStr);
        return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
    }

    function addPengikutRow() { daftarPengikut.push({ nama: '', jabatan: '', ket: '' }); renderPengikut(); saveData(); updatePreview(); }
    function removePengikutRow(idx) { daftarPengikut.splice(idx, 1); renderPengikut(); saveData(); updatePreview(); }
    function updatePengikutField(idx, field, val) { daftarPengikut[idx][field] = val; saveData(); updatePreview(); }

    function renderPengikut() {
        const container = document.getElementById('pengikutContainer');
        container.innerHTML = '';
        daftarPengikut.forEach((p, i) => {
            container.innerHTML += `
                <div class="border border-slate-200 p-3 rounded-lg bg-slate-50 relative">
                    <button type="button" onclick="removePengikutRow(${i})" class="absolute top-2 right-2 text-red-500 text-xs font-bold">Hapus</button>
                    <input type="text" placeholder="Nama" value="${p.nama}" oninput="updatePengikutField(${i}, 'nama', this.value)" class="form-outline mb-2 text-xs">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" placeholder="Jabatan" value="${p.jabatan}" oninput="updatePengikutField(${i}, 'jabatan', this.value)" class="form-outline text-xs">
                        <input type="text" placeholder="Ket" value="${p.ket}" oninput="updatePengikutField(${i}, 'ket', this.value)" class="form-outline text-xs">
                    </div>
                </div>
            `;
        });
    }

    function saveData() {
        const data = {};
        document.querySelectorAll('#sppdForm input, #sppdForm textarea, #sppdForm select').forEach(el => { if(el.id) data[el.id] = el.value; });
        data['pengikut'] = daftarPengikut;
        localStorage.setItem('sppd_kejaksaan_final', JSON.stringify(data));
    }

    function loadData() {
        const saved = localStorage.getItem('sppd_kejaksaan_final');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                for (const key in data) {
                    if (key === 'pengikut') daftarPengikut = data[key] || [];
                    else { const el = document.getElementById(key); if (el) el.value = data[key]; }
                }
            } catch (e) {}
        }
    }

    function getVal(id) { const el = document.getElementById(id); return el ? el.value : ''; }

    function updatePreview() {
        // [Fungsi Render Preview Tetap Sama Seperti Versi Sebelumnya]
    }

    // FUNGSI UNDUH (Menggunakan Constructor window.PizZip untuk mencegah ReferenceError)
    function eksekusiDocxTemplater(arrayBuffer, btnEl, originalText) {
        const PizZipConstructor = window.PizZip || window.pizzip;
        try {
            const zip = new PizZipConstructor(arrayBuffer);
            const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });
            
            // ... (Mapping Data Context) ...
            
            doc.render(contextData);
            const blob = doc.getZip().generate({ type: "blob" });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "SPPD.docx";
            a.click();
        } catch(e) { alert("Error: " + e.message); } finally { btnEl.innerHTML = originalText; btnEl.disabled = false; }
    }

    async function downloadWord() {
        const btn = document.getElementById('btnDownload');
        const originalText = btn.innerHTML;
        btn.innerHTML = "Memproses...";
        try {
            const response = await fetch("template.docx");
            const buf = await response.arrayBuffer();
            eksekusiDocxTemplater(buf, btn, originalText);
        } catch(e) { alert("Template tidak ditemukan! Gunakan tombol Manual Upload."); btn.innerHTML = originalText; btn.disabled = false; }
    }

    function generateFromLocalTemplate(el) {
        const reader = new FileReader();
        const btn = document.getElementById('btnDownload');
        reader.onload = (e) => eksekusiDocxTemplater(e.target.result, btn, "Unduh Word");
        reader.readAsArrayBuffer(el.files[0]);
    }
</script>
</body>
</html>
